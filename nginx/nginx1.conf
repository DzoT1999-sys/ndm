geo $is_trusted_proxy {
    default 0;
    172.20.0.0/16 1;
}

map $is_trusted_proxy $safe_xff {
    0 $remote_addr;
    1 $proxy_add_x_forwarded_for;
}

server {
    listen 80;
    server_name _;

    # Прямой запрос к приложению
    location / {
        proxy_pass http://app:80;
        proxy_set_header X-Forwarded-For $safe_xff;
        proxy_set_header Host $host;
    }

    # Цепочка: nginx1 -> nginx2 -> приложение
    location /via2 {
        proxy_pass http://nginx2:80;
        proxy_set_header X-Forwarded-For $safe_xff;
        proxy_set_header Host $host;
    }

    # Цепочка: nginx1 -> nginx2 -> nginx3 -> приложение
    location /via3 {
        proxy_pass http://nginx2:80/via3;
        proxy_set_header X-Forwarded-For $safe_xff;
        proxy_set_header Host $host;
    }
}
